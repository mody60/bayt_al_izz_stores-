<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oraimo Product Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Almarai', 'Tajawal', sans-serif; box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    :root {
      --luxury-dark: #0a0a13;
      --luxury-card: #131322;
      --luxury-accent: #e8a137;
      --luxury-gold: #f4c430;
      --luxury-text: #f7f3eb;
      --luxury-muted: #8b7d6b;
    }

    body {
      background: linear-gradient(135deg, #0a0a13 0%, #1a1519 50%, #0f0f1e 100%);
      color: var(--luxury-text);
    }

    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page-content { animation: pageEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .detail-page-overlay { animation: fadeInOverlay 0.4s ease-out; }
    @keyframes fadeInOverlay {
      from { opacity: 0; backdrop-filter: blur(0px); }
      to { opacity: 1; backdrop-filter: blur(8px); }
    }

    .detail-page-content { animation: slideUpDetail 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideUpDetail {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .product-card {
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1.5px solid rgba(232, 161, 55, 0.15);
      position: relative;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(232, 161, 55, 0.1), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .product-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(232, 161, 55, 0.12));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .product-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(232, 161, 55, 0.5);
      box-shadow: 0 24px 60px rgba(232, 161, 55, 0.18), 0 0 80px rgba(232, 161, 55, 0.08);
    }
    .product-card:hover::before { opacity: 1; }

    .img-container {
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(250,250,250,0.96) 50%, rgba(245,245,245,0.92) 100%);
      position: relative;
      height: 240px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: inset 0 10px 24px rgba(232, 161, 55, 0.12), inset 0 -10px 24px rgba(0,0,0,0.05);
    }
    .product-card:hover .img-container { transform: scale(1.04); }
    .product-card:hover .img-container img { transform: scale(1.12) rotate(2deg); }

    .img-container img {
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 10px 28px rgba(232, 161, 55, 0.2));
      animation: imageReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes imageReveal {
      0% { clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%); opacity: 0; }
      50% { opacity: 0.8; }
      100% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%); opacity: 1; }
    }

    .price-tag {
      background: linear-gradient(135deg, var(--luxury-accent), var(--luxury-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .category-pill {
      backdrop-filter: blur(12px);
      background: rgba(232, 161, 55, 0.12);
      border: 1.5px solid rgba(232, 161, 55, 0.35);
      color: var(--luxury-accent);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-weight: 600;
    }
    .category-pill:hover {
      background: rgba(232, 161, 55, 0.25);
      border-color: rgba(232, 161, 55, 0.7);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(232, 161, 55, 0.2);
    }

    header {
      background: linear-gradient(135deg, rgba(10, 10, 19, 0.98), rgba(19, 19, 34, 0.98));
      backdrop-filter: blur(25px);
      border-bottom: 2px solid rgba(232, 161, 55, 0.3);
      box-shadow: 0 12px 40px rgba(232, 161, 55, 0.12), inset 0 1px 0 rgba(232, 161, 55, 0.2);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232, 161, 55, 0.4), transparent);
    }

    .header-glow {
      background: linear-gradient(135deg, var(--luxury-accent), var(--luxury-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .promo-banner {
      animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: linear-gradient(90deg, rgba(232, 161, 55, 0.15), rgba(244, 196, 48, 0.12), rgba(232, 161, 55, 0.15));
      border-bottom: 2px solid rgba(232, 161, 55, 0.35);
      color: var(--luxury-accent);
      box-shadow: inset 0 1px 0 rgba(232, 161, 55, 0.3), 0 8px 20px rgba(232, 161, 55, 0.15);
      font-weight: 700;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .promo-banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmerPromo 3s infinite;
    }

    @keyframes shimmerPromo {
      0% { left: -100%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .fade-in {
      animation: fadeInScale 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeInScale {
      0% { opacity: 0; transform: scale(0.92) translateY(20px); }
      50% { transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .btn-luxury {
      background: linear-gradient(135deg, rgba(232, 161, 55, 0.18), rgba(244, 196, 48, 0.1));
      border: 1.5px solid rgba(232, 161, 55, 0.5);
      color: var(--luxury-accent);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .btn-luxury:hover {
      background: linear-gradient(135deg, rgba(232, 161, 55, 0.3), rgba(244, 196, 48, 0.2));
      border-color: rgba(232, 161, 55, 0.8);
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(232, 161, 55, 0.25);
    }

    .search-box {
      background: rgba(232, 161, 55, 0.08);
      border: 1.5px solid rgba(232, 161, 55, 0.25);
      color: var(--luxury-text);
      transition: all 0.3s ease;
    }
    .search-box:focus-within {
      background: rgba(232, 161, 55, 0.15);
      border-color: rgba(232, 161, 55, 0.6);
      box-shadow: 0 0 25px rgba(232, 161, 55, 0.25);
    }

    .stat-box {
      background: linear-gradient(135deg, rgba(232, 161, 55, 0.1), rgba(244, 196, 48, 0.05));
      border: 1.5px solid rgba(232, 161, 55, 0.3);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-box:hover {
      background: linear-gradient(135deg, rgba(232, 161, 55, 0.15), rgba(244, 196, 48, 0.1));
      border-color: rgba(232, 161, 55, 0.6);
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(232, 161, 55, 0.18);
    }
    .stat-number { font-size: 18px; font-weight: 900; color: var(--luxury-accent); }
    .stat-label { font-size: 10px; opacity: 0.6; margin-top: 4px; color: var(--luxury-muted); }

    footer {
      background: linear-gradient(135deg, rgba(10, 10, 19, 0.95), rgba(19, 19, 34, 0.95));
      border-top: 2px solid rgba(232, 161, 55, 0.3);
      box-shadow: 0 -12px 40px rgba(232, 161, 55, 0.12), inset 0 1px 0 rgba(232, 161, 55, 0.2);
      position: relative;
    }
    footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232, 161, 55, 0.4), transparent);
    }

    .close-detail-btn {
      background: rgba(232, 161, 55, 0.12);
      color: var(--luxury-accent);
      border: 1.5px solid rgba(232, 161, 55, 0.3);
      transition: all 0.3s ease;
    }
    .close-detail-btn:hover {
      background: rgba(232, 161, 55, 0.22);
      border-color: rgba(232, 161, 55, 0.6);
      transform: scale(1.08);
    }

    .zoom-container { transform-origin: top center; transition: transform 0.2s ease; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(232, 161, 55, 0.06); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, rgba(232, 161, 55, 0.5), rgba(244, 196, 48, 0.4));
      border-radius: 4px;
      box-shadow: inset 0 0 6px rgba(0,0,0,0.3);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, rgba(232, 161, 55, 0.7), rgba(244, 196, 48, 0.6));
    }

    .installment-field {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      outline: none;
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: var(--luxury-text);
      transition: all 0.25s ease;
    }
    .installment-field:focus {
      border-color: rgba(212, 175, 55, 0.55);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.08);
    }
    .installment-field option {
      color: #111;
    }

    @media (max-width: 768px) {
      .detail-page-content { max-height: 90vh !important; }
    }

    @media print {
      .no-print { display: none !important; }
      body { background: white !important; color: #000 !important; }
      .product-card, .stat-box { break-inside: avoid; box-shadow: none !important; }
    }
  </style>
</head>

  <script>
    const calculatePrices = (wholesale) => {
      const semi = Math.ceil((wholesale * 1.10) / 5) * 5;
      const retail = Math.ceil((wholesale * 1.15) / 10) * 10;
      return { semi, retail };
    };

    const INSTALLMENT_RATES = {
      3: 15,
      6: 30,
      9: 40,
      12: 50
    };

    function getInstallmentRate(months) {
      return INSTALLMENT_RATES[Number(months)] || 0;
    }

    function calculateInstallmentPlan(retailPrice, downPayment = 0, months = 0) {
      const cashPrice = Number(retailPrice) || 0;
      let deposit = Number(downPayment) || 0;
      const period = Number(months) || 0;

      if (!cashPrice || !period) return null;

      if (deposit < 0) deposit = 0;
      if (deposit > cashPrice) deposit = cashPrice;

      const rate = getInstallmentRate(period);
      const remaining = cashPrice - deposit;
      const increaseAmount = remaining * (rate / 100);
      const totalInstallment = remaining + increaseAmount;
      const monthlyInstallment = totalInstallment / period;

      return {
        cashPrice,
        downPayment: deposit,
        remaining,
        rate,
        increaseAmount,
        totalInstallment,
        monthlyInstallment,
        months: period
      };
    }

    const rawProducts = [

        currentImageIndex = (currentImageIndex + 1) % selectedProduct.images.length;

              </div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-[9px] sm:text-[10px] opacity-40">قطاعي</span>
              <div class="flex items-center gap-1">
                <span class="font-bold text-xs sm:text-sm opacity-70">${product.retail.toLocaleString('ar-EG')} ج.م</span>
                <span class="text-[8px] sm:text-[9px] opacity-50">+${priceUpPercent2}%</span>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-3 sm:mt-4">
            <button class="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg text-xs font-bold btn-luxury transition-all" type="button">عرض التفاصيل</button>
            <button class="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg text-xs font-bold transition-all text-white font-black" type="button" style="background: linear-gradient(135deg, #ff6b35, #ff8c42, #ffa94d); border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);">✨ قسط الآن</button>
          </div>
        </div>
      `;

      const [detailBtn, installmentBtn] = card.querySelectorAll('button');

      detailBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDetailPage(product.id);
      });

      installmentBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openInstallmentModal(product);
      });

      card.addEventListener('click', () => openDetailPage(product.id));

      return card;
    }

    function updateQuickStats(filtered) {
      const statsContainer = document.getElementById('quickStats');
      const totalProducts = filtered.length;
      const minPrice = filtered.length > 0 ? Math.min(...filtered.map(p => p.wholesale)) : 0;
      const maxPrice = filtered.length > 0 ? Math.max(...filtered.map(p => p.retail)) : 0;
      const avgPrice = filtered.length > 0 ? Math.round(filtered.reduce((sum, p) => sum + p.semi, 0) / filtered.length) : 0;

      statsContainer.innerHTML = `
        <div class="stat-box">
          <div class="stat-number">${totalProducts}</div>
          <div class="stat-label">المنتجات</div>
        </div>
        <div class="stat-box">
          <div class="stat-number price-tag">${minPrice.toLocaleString('ar-EG')}</div>
          <div class="stat-label">الحد الأدنى</div>
        </div>
        <div class="stat-box">
          <div class="stat-number price-tag">${maxPrice.toLocaleString('ar-EG')}</div>
          <div class="stat-label">الحد الأقصى</div>
        </div>
        <div class="stat-box">
          <div class="stat-number price-tag">${avgPrice.toLocaleString('ar-EG')}</div>
          <div class="stat-label">السعر المتوسط</div>
        </div>
      `;
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      const noResults = document.getElementById('noResults');

      let filtered = products;

      if (activeCategory !== 'الكل') {
        filtered = filtered.filter(p => p.category === activeCategory);
      }

      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(p =>
          p.model.toLowerCase().includes(term) ||
          p.feature.toLowerCase().includes(term) ||
          p.detail.toLowerCase().includes(term) ||
          p.category.toLowerCase().includes(term)
        );
      }

      updateQuickStats(filtered);
      grid.innerHTML = '';

      if (filtered.length === 0) {
        noResults.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        filtered.forEach((p, i) => grid.appendChild(createProductCard(p, i)));
      }

      reinitIcons();
    }

    function openDetailPage(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      selectedProduct = product;
      currentImageIndex = 0;
      stopCarousel();

      document.getElementById('detailTitle').textContent = selectedProduct.model;
      showCurrentDetailImage();

      const detailBody = document.getElementById('detailBody');
      detailBody.innerHTML = `
        <div class="space-y-4 sm:space-y-5">
          <div>
            <h3 class="text-xs sm:text-sm font-bold opacity-70 mb-2" style="color: var(--luxury-muted);">الفئة</h3>
            <p class="text-sm sm:text-base" style="color: var(--luxury-accent);">${categoryLabels[selectedProduct.category] || selectedProduct.category}</p>
          </div>
          <div>
            <h3 class="text-xs sm:text-sm font-bold opacity-70 mb-2" style="color: var(--luxury-muted);">الميزات الرئيسية</h3>
            <p class="text-sm sm:text-base font-bold" style="color: var(--luxury-text);">${selectedProduct.feature}</p>
          </div>
          <div>
            <h3 class="text-xs sm:text-sm font-bold opacity-70 mb-2" style="color: var(--luxury-muted);">الوصف الكامل</h3>
            <p class="text-xs sm:text-sm leading-relaxed" style="color: var(--luxury-text);">${selectedProduct.detail}</p>
          </div>
          <div style="border-top: 1.5px solid rgba(212, 175, 55, 0.2); padding-top: 16px;">
            <h3 class="text-xs sm:text-sm font-bold opacity-70 mb-3" style="color: var(--luxury-muted);">الأسعار</h3>
            <div class="space-y-2.5 sm:space-y-3">
              <div class="flex justify-between items-center p-2 sm:p-3 rounded-lg" style="background: rgba(212, 175, 55, 0.08); border: 1px solid rgba(212, 175, 55, 0.15);">
                <span class="text-xs sm:text-sm opacity-70">سعر الجملة</span>
                <span class="font-black text-base sm:text-lg price-tag">${selectedProduct.wholesale.toLocaleString('ar-EG')} ج.م</span>
              </div>
              <div class="flex justify-between items-center p-2 sm:p-3 rounded-lg" style="background: rgba(212, 175, 55, 0.08); border: 1px solid rgba(212, 175, 55, 0.15);">
                <span class="text-xs sm:text-sm opacity-70">نص جملة (+10%)</span>
                <span class="font-black text-base sm:text-lg" style="color: var(--luxury-gold);">${selectedProduct.semi.toLocaleString('ar-EG')} ج.م</span>
              </div>
              <div class="flex justify-between items-center p-2 sm:p-3 rounded-lg" style="background: rgba(212, 175, 55, 0.08); border: 1px solid rgba(212, 175, 55, 0.15);">
                <span class="text-xs sm:text-sm opacity-70">السعر القطاعي (+15%)</span>
                <span class="font-black text-base sm:text-lg" style="color: var(--luxury-gold);">${selectedProduct.retail.toLocaleString('ar-EG')} ج.م</span>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('contactDetailBtn').onclick = () => {
        const message = `السلام عليكم، أود الاستفسار عن المنتج:\n${selectedProduct.model}\n\nسعر الجملة: ${selectedProduct.wholesale} ج.م`;
        openWhatsapp(message);
      };

      document.getElementById('shareDetailBtn').onclick = () => {
        const text = `تحقق من هذا المنتج: ${selectedProduct.model}\nالسعر: ${selectedProduct.wholesale} ج.م\nالميزات: ${selectedProduct.feature}`;
        shareText(text, selectedProduct.model);
      };

      document.getElementById('installmentDetailBtn').onclick = () => openInstallmentModal(selectedProduct);

      document.getElementById('detailPageOverlay').classList.remove('hidden');
      startCarousel();
      reinitIcons();
    }

    function closeDetailPage() {
      stopCarousel();
      document.getElementById('detailPageOverlay').classList.add('hidden');
      selectedProduct = null;
      currentImageIndex = 0;
      document.getElementById('detailImage').src = '';
      document.getElementById('detailImage').alt = '';
      updateImageCounter();
    }

    function updateZoom() {
      const container = document.getElementById('productsContainer');
      container.style.transform = `scale(${zoomLevel})`;
      document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
    }

    function updateContactLinks() {
      const whatsappNum = sanitizePhone(appConfig.whatsapp_number);
      const phoneNum = String(appConfig.phone_number || '');

      const whatsappLink = document.getElementById('whatsappLink');
      const phoneLink = document.getElementById('phoneLink');

      if (whatsappLink) {
        whatsappLink.href = whatsappNum ? `https://wa.me/${whatsappNum}` : '#';
      }
      if (phoneLink) {
        phoneLink.href = phoneNum ? `tel:${phoneNum}` : '#';
      }
    }

    function applyConfig(config) {
      const bg = config.background_color || defaultConfig.background_color;
      const textCol = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const font = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;

      document.documentElement.style.setProperty('--luxury-dark', bg);
      document.documentElement.style.setProperty('--luxury-accent', primary);
      document.documentElement.style.setProperty('--luxury-text', textCol);
      document.body.style.fontFamily = `${font}, Almarai, Tajawal, sans-serif`;
      document.body.style.fontSize = fontSize + 'px';

      document.getElementById('header-title').textContent = config.catalog_title || defaultConfig.catalog_title;
      document.getElementById('header-company').textContent = config.company_name || defaultConfig.company_name;
      document.getElementById('promoBanner').textContent = config.promo_text || defaultConfig.promo_text;
      document.getElementById('footer-text').textContent = config.footer_text || defaultConfig.footer_text;
      document.body.style.background = `linear-gradient(135deg, ${bg} 0%, #1a1519 50%, #0f0f1e 100%)`;

      updateContactLinks();
      renderCategoryFilters();
      renderProducts();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchTerm = e.target.value.trim();
      renderProducts();
    });

    document.getElementById('zoomInBtn').addEventListener('click', () => {
      zoomLevel = Math.min(zoomLevel + 0.1, 2.5);
      updateZoom();
    });

    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      zoomLevel = Math.max(zoomLevel - 0.1, 0.4);
      updateZoom();
    });

    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('closeDetailBtn').addEventListener('click', closeDetailPage);
    document.getElementById('prevImageBtn').addEventListener('click', prevImage);
    document.getElementById('nextImageBtn').addEventListener('click', nextImage);

    document.getElementById('detailPageOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'detailPageOverlay') closeDetailPage();
    });

    document.getElementById('closeInstallmentBtn').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      document.getElementById('installmentModal').classList.add('hidden');
    });

    document.getElementById('installmentModal').addEventListener('click', (e) => {
      if (e.target.id === 'installmentModal') {
        e.preventDefault();
        e.stopPropagation();
        document.getElementById('installmentModal').classList.add('hidden');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !document.getElementById('detailPageOverlay').classList.contains('hidden')) {
        closeDetailPage();
      }
      if (e.key === 'Escape' && !document.getElementById('installmentModal').classList.contains('hidden')) {
        document.getElementById('installmentModal').classList.add('hidden');
      }
    });

    applyConfig(appConfig);
    updateZoom();
    reinitIcons();
  </script>
</body>
</html>
